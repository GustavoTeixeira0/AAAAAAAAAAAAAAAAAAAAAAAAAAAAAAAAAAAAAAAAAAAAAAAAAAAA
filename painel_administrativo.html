  <div class="container">

    <div class="card" style="width:100%; max-width:1200px;">

      <!-- TÍTULO -->
      <div class="title">
        <h2>Registrar novo usuário:</h2>
      </div>

      <!-- FORMULÁRIO -->
      <div class="register-grid">

        <div class="input-group">
          <input type="text" placeholder="usuário">
          <span class="icon">
            <i class="bi bi-person"></i>
          </span>
        </div>

        <div class="input-group">
          <input type="email" placeholder="e-mail">
          <span class="icon">
            <i class="bi bi-envelope"></i>
          </span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="senha">
          <span class="icon">
            <i class="bi bi-key"></i>
          </span>
        </div>

        <div class="input-group">
          <select>
            <option selected disabled>tipo da conta</option>
            <option>Professor</option>
            <option>Aluno</option>
            <option>Administrador</option>
          </select>
          <span class="icon">
            <i class="bi bi-chevron-down"></i>
          </span>
        </div>

      </div>

      <!-- SOLICITAÇÕES -->
      <h2 class="request-title">Solicitações de Inscrição:</h2>

      <!-- Solicitação 1 -->
      <div class="request-item">

        <div>

          <div class="input-group">
            <input type="text" value="Marcos Oliveira" readonly>
            <span class="icon">
              <i class="bi bi-person"></i>
            </span>
          </div>

          <div class="input-group">
            <input type="text" value="M@rC0s!8291" readonly>
            <span class="icon">
              <i class="bi bi-key"></i>
            </span>
          </div>

        </div>

        <div>

          <div class="input-group">
            <input type="text" value="marcos.oliveira92@gmail.com" readonly>
            <span class="icon">
              <i class="bi bi-envelope"></i>
            </span>
          </div>

          <div class="input-group">
            <select disabled>
              <option selected>Professor</option>
            </select>

            <span class="icon">
              <i class="bi bi-chevron-down"></i>
            </span>

          </div>

        </div>

        <div class="buttons-column">
          <button>Permitir</button>
          <button>Negar</button>
        </div>

      </div>

      <!-- Solicitação vazia -->
      <div class="request-item" style="opacity: 0.35;">

        <div>

          <div class="input-group">
            <input type="text" placeholder="usuário" readonly>
            <span class="icon">
              <i class="bi bi-person"></i>
            </span>
          </div>

          <div class="input-group">
            <input type="text" placeholder="senha" readonly>
            <span class="icon">
              <i class="bi bi-key"></i>
            </span>
          </div>

        </div>

        <div>

          <div class="input-group">
            <input type="text" placeholder="e-mail" readonly>
            <span class="icon">
              <i class="bi bi-envelope"></i>
            </span>
          </div>

          <div class="input-group">
            <select disabled>
              <option selected>tipo da conta</option>
            </select>
            <span class="icon">
              <i class="bi bi-chevron-down"></i>
            </span>
          </div>

        </div>

        <div class="buttons-column">
          <button>Permitir</button>
          <button>Negar</button>
        </div>

      </div>

    </div>
